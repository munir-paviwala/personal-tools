<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Markdown Reader</title>
    <link href="assets/css/space-grotesk.css" rel="stylesheet">
    <link href="assets/css/vt323.css" rel="stylesheet">
    <script src="assets/js/marked.min.js"></script>
    <style>
        :root {
            /* Dynamic variables - defaults to The Zone Night */
            --bg: #121212; 
            --text: #e0e0e0; 
            --accent: #333; 
            --bar: #ffffff;
            --box-bg: rgba(255,255,255,0.02); 
            --toolbar-bg: rgba(18,18,18,0.95);
            --danger: #ff4757;
            --font-body: ui-monospace, SFMono-Regular, "Cascadia Code", Menlo, Consolas, monospace;
            --font-heading: ui-monospace, SFMono-Regular, "Cascadia Code", Menlo, Consolas, monospace;
            --border-w: 1px;
            --shadow-offset: 0px;
            --btn-text-transform: none;
            --heading-size: 2.2rem;
            --heading-shadow: none;
            --transition-speed: 0.4s;
            --pattern-opacity: 0;
        }

        body { 
            margin: 0; padding: 0; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-body); 
            overflow-x: hidden; 
            transition: background var(--transition-speed), color var(--transition-speed); 
        }

        /* Subtle dot pattern for Indian Writer themes */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image: radial-gradient(var(--accent) 1.5px, transparent 1.5px);
            background-size: 35px 35px;
            opacity: var(--pattern-opacity);
            transition: opacity var(--transition-speed);
        }
        
        a { color: var(--bar); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; gap: 15px; transition: opacity 0.4s ease; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        .setup-box { 
            padding: 40px; 
            border-radius: calc(16px - (var(--border-w) * 2));
            border: var(--border-w) solid var(--accent); 
            background: var(--box-bg); 
            display: flex; flex-direction: column; gap: 20px; align-items: center; 
            width: 500px; max-width: 100%; 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--bar); 
            box-sizing: border-box; backdrop-filter: blur(10px);
            transition: all var(--transition-speed);
            position: relative;
        }

        h1 { 
            font-family: var(--font-heading); 
            font-weight: normal; letter-spacing: 1px; margin: 0 0 5px 0; 
            font-size: var(--heading-size); text-align: center; 
            text-shadow: var(--heading-shadow); 
            line-height: 1; transition: all var(--transition-speed); 
        }
        
        .row { display: flex; flex-direction: column; gap: 8px; font-size: 0.95rem; width: 100%; align-items: flex-start; position: relative; font-weight: bold; }
        
        button { 
            width: 100%; padding: 12px 16px; 
            background: var(--bg); border: var(--border-w) solid var(--accent); 
            color: var(--text); cursor: pointer; 
            border-radius: calc(8px - var(--border-w)); 
            font-family: var(--font-heading); font-size: 1.1rem; 
            text-transform: var(--btn-text-transform);
            box-shadow: calc(var(--shadow-offset)*0.5) calc(var(--shadow-offset)*0.5) 0px var(--bar);
            transition: all 0.2s; outline: none; box-sizing: border-box; 
        }
        button:hover { 
            transform: translate(-1px, -1px);
            box-shadow: calc(var(--shadow-offset)*0.7) calc(var(--shadow-offset)*0.7) 0px var(--bar);
            background: var(--accent); color: var(--bg); 
        }

        /* Custom Select Styles */
        .custom-select { position: relative; width: 100%; font-family: var(--font-body); }
        .select-selected { 
            padding: 12px 16px; border: var(--border-w) solid var(--accent); 
            border-radius: calc(8px - var(--border-w));
            background: var(--bg); cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            transition: all 0.2s; user-select: none; font-size: 1rem; font-weight: bold;
        }
        .select-selected:hover { background: var(--accent); color: var(--bg); }
        .select-selected::after { content: '▼'; font-size: 0.7rem; opacity: 0.8; transition: transform 0.2s; }
        .custom-select.active .select-selected::after { transform: rotate(180deg); }
        
        .select-items { 
            position: absolute; top: 100%; left: 0; right: 0; z-index: 99; margin-top: 5px; 
            background: var(--bg); border: var(--border-w) solid var(--accent); 
            border-radius: calc(8px - var(--border-w));
            max-height: 250px; overflow-y: auto; 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--bar); 
            display: none; transition: all var(--transition-speed); 
        }
        .custom-select.active .select-items { display: block; }
        .select-items div { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--accent); transition: background 0.2s; font-weight: bold; }
        .select-items div:last-child { border-bottom: none; }
        .select-items div:hover { background: var(--accent); color: var(--bg); }

        /* Floating Theme Selector Tweaks */
        .floating-controls { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; align-items: flex-end; z-index: 5000; transition: opacity 0.5s ease; }
        .floating-theme-selector { width: 220px; opacity: 0.4; transition: opacity 0.3s; }
        .floating-theme-selector:hover, .floating-theme-selector.active { opacity: 1; }
        .floating-theme-selector .select-items { max-height: 400px; } 

        #drop-zone {
            width: 100%;
            height: 150px;
            border: 2px dashed var(--accent);
            border-radius: calc(8px - var(--border-w));
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--text);
            opacity: 0.8;
            transition: all 0.2s;
            cursor: pointer;
            box-sizing: border-box;
            background: var(--bg);
        }

        #drop-zone.drag-over {
            background: var(--accent);
            color: var(--bg);
            border-style: solid;
        }
        
        #file-input { display: none; }

        .recent-files {
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }

        .recent-file-item {
            padding: 10px;
            background: var(--bg);
            border: var(--border-w) solid var(--accent);
            border-radius: calc(4px - var(--border-w));
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .recent-file-item:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .recent-file-item .delete-btn {
            background: transparent;
            border: none;
            box-shadow: none;
            color: inherit;
            width: auto;
            padding: 5px;
            font-size: 1rem;
        }

        .recent-file-item .delete-btn:hover {
            color: var(--danger);
            transform: none;
            background: transparent;
        }

        /* Reader Area */
        #reader-screen {
            justify-content: flex-start;
            padding: 0;
            overflow-y: auto;
            display: block; /* overriding flex */
        }

        #reader-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 100px 20px;
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 100vh;
            font-family: var(--font-body);
        }
        
        #reader-container h1, #reader-container h2, #reader-container h3, #reader-container h4, #reader-container h5, #reader-container h6 {
            font-family: var(--font-heading);
            text-align: left;
            margin-top: 2em;
            margin-bottom: 0.5em;
            font-weight: normal;
        }
        
        #reader-container p, #reader-container ul, #reader-container ol {
            margin-bottom: 1.5em;
            font-family: var(--font-body);
        }

        #reader-container pre {
            background: var(--box-bg);
            padding: 15px;
            border: var(--border-w) solid var(--accent);
            border-radius: 4px;
            overflow-x: auto;
        }

        #reader-container code {
            font-family: ui-monospace, monospace;
            background: var(--box-bg);
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        #reader-container blockquote {
            border-left: 4px solid var(--accent);
            margin-left: 0;
            padding-left: 20px;
            font-style: italic;
            opacity: 0.9;
        }
        
        #reader-container img {
            max-width: 100%;
            border: var(--border-w) solid var(--accent);
            border-radius: 4px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: auto;
            padding: 10px 20px;
            z-index: 5000;
        }

        @media (max-width: 600px) {
            .setup-box { padding: 25px 20px; }
            h1 { font-size: 2rem; }
            #reader-container { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="floating-controls">
        <div class="custom-select floating-theme-selector" id="theme-selector" data-target="theme-select">
            <div class="select-selected" id="theme-display">Sleek Midnight</div>
            <div class="select-items" id="theme-list">
            </div>
        </div>
        <input type="hidden" id="theme-select" value="zone-night">
    </div>

    <div id="setup-screen" class="screen">
        <div class="setup-box">
            <h1 id="main-title">MARKDOWN READER</h1>
            <p style="text-align: center; margin: 0; opacity: 0.8; font-size: 0.9rem;">Drop a .md file or select one from your history.</p>

            <div id="drop-zone">
                Drag & Drop .md file here<br>or click to browse
            </div>
            <input type="file" id="file-input" accept=".md, .txt">

            <div class="row" style="margin-top: 10px; width: 100%;">
                <label>Recent Files:</label>
                <div id="recent-files-list" class="recent-files">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <div id="reader-screen" class="screen hidden">
        <button class="back-button" onclick="showSetup()">← Back</button>
        <div id="reader-container">
            <!-- Rendered markdown goes here -->
        </div>
    </div>

    <script>
        /* THEMES CONFIGURATION (copied from dangerous-writer) */
        const themes = {
            'zone-night': { name: 'Sleek Midnight', bg: '#121212', text: '#e0e0e0', accent: '#333', bar: '#ffffff', boxBg: 'rgba(255,255,255,0.02)', toolbarBg: 'rgba(18,18,18,0.95)', fontBody: 'ui-monospace, monospace', fontHeading: 'ui-monospace, monospace', borderW: '1px', shadowW: '0px', btnTransform: 'none', danger: '#ff4757', headingSize: '2.2rem', patternOpacity: '0' },
            'zone-day': { name: 'Coffee Cozy', bg: '#fbf7f0', text: '#5c4b37', accent: '#d4c5b0', bar: '#8bba94', boxBg: 'rgba(0,0,0,0.02)', toolbarBg: 'rgba(251,247,240,0.95)', fontBody: 'ui-monospace, monospace', fontHeading: 'ui-monospace, monospace', borderW: '1px', shadowW: '0px', btnTransform: 'none', danger: '#ff4757', headingSize: '2.2rem', patternOpacity: '0' },
            'ind-dark-1': { name: 'Indigo Maximalist', bg: '#311b92', text: '#ffc107', accent: '#00bcd4', bar: '#bf360c', boxBg: 'rgba(0,0,0,0.4)', toolbarBg: 'rgba(49,27,146,0.95)', fontBody: '"Space Grotesk", sans-serif', fontHeading: '"VT323", monospace', borderW: '4px', shadowW: '8px', btnTransform: 'uppercase', danger: '#d50000', headingSize: '2.2rem', patternOpacity: '0.15' },
            'ind-dark-2': { name: 'Gulaabi Midnight', bg: '#1a0018', text: '#ff4081', accent: '#00e676', bar: '#ffd54f', boxBg: 'rgba(0,0,0,0.5)', toolbarBg: 'rgba(26,0,24,0.95)', fontBody: '"Space Grotesk", sans-serif', fontHeading: '"VT323", monospace', borderW: '4px', shadowW: '8px', btnTransform: 'uppercase', danger: '#d50000', headingSize: '2.2rem', patternOpacity: '0.15' },
            'ind-light-1': { name: 'Pistachio Minimal', bg: '#faf8f5', text: '#3e2723', accent: '#c5e1a5', bar: '#d84315', boxBg: 'rgba(255,255,255,0.8)', toolbarBg: 'rgba(250,248,245,0.95)', fontBody: '"Space Grotesk", sans-serif', fontHeading: '"VT323", monospace', borderW: '4px', shadowW: '8px', btnTransform: 'uppercase', danger: '#d50000', headingSize: '2.2rem', patternOpacity: '0.15' },
            'ind-light-2': { name: 'Morpinch Sea', bg: '#e0f2f1', text: '#00695c', accent: '#fbc02d', bar: '#f48fb1', boxBg: 'rgba(255,255,255,0.8)', toolbarBg: 'rgba(224,242,241,0.95)', fontBody: '"Space Grotesk", sans-serif', fontHeading: '"VT323", monospace', borderW: '4px', shadowW: '8px', btnTransform: 'uppercase', danger: '#d50000', headingSize: '2.2rem', patternOpacity: '0.15' },
            'ind-dark-3': { name: 'Morpinch Forest', bg: '#004d40', text: '#fff59d', accent: '#ff7043', bar: '#26a69a', boxBg: 'rgba(0,0,0,0.4)', toolbarBg: 'rgba(0,77,64,0.95)', fontBody: '"Space Grotesk", sans-serif', fontHeading: '"VT323", monospace', borderW: '4px', shadowW: '8px', btnTransform: 'uppercase', danger: '#d50000', headingSize: '2.2rem', patternOpacity: '0.15' },
            'ind-light-3': { name: 'Gulaabi Rose', bg: '#fce4ec', text: '#880e4f', accent: '#9e9d24', bar: '#ff9800', boxBg: 'rgba(255,255,255,0.8)', toolbarBg: 'rgba(252,228,236,0.95)', fontBody: '"Space Grotesk", sans-serif', fontHeading: '"VT323", monospace', borderW: '4px', shadowW: '8px', btnTransform: 'uppercase', danger: '#d50000', headingSize: '2.2rem', patternOpacity: '0.15' }
        };

        function populateThemeList() {
            const list = document.getElementById('theme-list');
            list.innerHTML = '';
            for (const [key, t] of Object.entries(themes)) {
                const div = document.createElement('div');
                div.dataset.value = key;
                div.innerText = t.name;
                div.style.backgroundColor = t.bg;
                div.style.color = t.text;
                div.style.borderBottom = `2px solid ${t.accent}`;
                div.addEventListener('click', () => {
                    document.getElementById('theme-display').innerText = t.name;
                    document.getElementById('theme-select').value = key;
                    applyTheme(key);
                    document.getElementById('theme-selector').classList.remove('active');
                });
                list.appendChild(div);
            }
        }

        function applyTheme(themeKey) {
            const t = themes[themeKey];
            if(!t) return;
            const root = document.documentElement;
            root.style.setProperty('--bg', t.bg);
            root.style.setProperty('--text', t.text);
            root.style.setProperty('--accent', t.accent);
            root.style.setProperty('--bar', t.bar);
            root.style.setProperty('--box-bg', t.boxBg);
            root.style.setProperty('--toolbar-bg', t.toolbarBg);
            root.style.setProperty('--font-body', t.fontBody);
            root.style.setProperty('--font-heading', t.fontHeading);
            root.style.setProperty('--border-w', t.borderW);
            root.style.setProperty('--shadow-offset', t.shadowW);
            root.style.setProperty('--btn-text-transform', t.btnTransform);
            root.style.setProperty('--danger', t.danger);
            root.style.setProperty('--heading-size', t.headingSize);
            root.style.setProperty('--pattern-opacity', t.patternOpacity);
            root.style.setProperty('--heading-shadow', t.shadowW === '0px' ? 'none' : `3px 3px ${t.bar}`);

            localStorage.setItem('mdReaderTheme', themeKey);
        }

        /* CUSTOM SELECT SETUP */
        function initCustomSelect() {
            const themeSel = document.getElementById('theme-selector');
            themeSel.querySelector('.select-selected').addEventListener('click', (e) => {
                e.stopPropagation();
                themeSel.classList.toggle('active');
            });
            document.addEventListener('click', () => {
                themeSel.classList.remove('active');
            });
        }

        /* APP LOGIC */
        const MAX_RECENT_FILES = 20;
        let recentFiles = [];

        function loadRecentFiles() {
            try {
                const stored = localStorage.getItem('mdReaderRecentFiles');
                if (stored) {
                    recentFiles = JSON.parse(stored);
                }
            } catch (e) {
                console.error("Could not load recent files", e);
            }
            renderRecentFilesList();
        }

        function saveRecentFiles() {
            try {
                localStorage.setItem('mdReaderRecentFiles', JSON.stringify(recentFiles));
            } catch (e) {
                console.error("Could not save recent files", e);
            }
        }

        function renderRecentFilesList() {
            const list = document.getElementById('recent-files-list');
            list.innerHTML = '';
            
            if (recentFiles.length === 0) {
                list.innerHTML = '<div style="opacity: 0.5; font-style: italic; padding: 10px; text-align: center;">No recent files</div>';
                return;
            }

            recentFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'recent-file-item';
                
                const nameSpan = document.createElement('span');
                nameSpan.innerText = file.name;
                nameSpan.style.flexGrow = '1';
                nameSpan.style.overflow = 'hidden';
                nameSpan.style.textOverflow = 'ellipsis';
                nameSpan.style.whiteSpace = 'nowrap';
                
                nameSpan.addEventListener('click', () => {
                    openMarkdown(file.content, file.name);
                });

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerHTML = '×';
                deleteBtn.title = 'Remove from history';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    recentFiles.splice(index, 1);
                    saveRecentFiles();
                    renderRecentFilesList();
                });

                item.appendChild(nameSpan);
                item.appendChild(deleteBtn);
                list.appendChild(item);
            });
        }

        function addFileToHistory(name, content) {
            // Remove if already exists to move to top
            recentFiles = recentFiles.filter(f => f.name !== name);
            
            // Add to top
            recentFiles.unshift({ name, content });
            
            // Limit to max
            if (recentFiles.length > MAX_RECENT_FILES) {
                recentFiles = recentFiles.slice(0, MAX_RECENT_FILES);
            }
            
            saveRecentFiles();
            renderRecentFilesList();
        }

        function openMarkdown(content, filename) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('reader-screen').classList.remove('hidden');
            
            // Use marked to parse
            const html = marked.parse(content);
            document.getElementById('reader-container').innerHTML = `<h1>${filename}</h1>` + html;
            window.scrollTo(0, 0);
        }

        function showSetup() {
            document.getElementById('reader-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        /* FILE HANDLING */
        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                addFileToHistory(file.name, content);
                openMarkdown(content, file.name);
            };
            reader.readAsText(file);
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        /* INIT */
        document.addEventListener('DOMContentLoaded', () => {
            populateThemeList();
            initCustomSelect();
            
            const savedTheme = localStorage.getItem('mdReaderTheme') || 'zone-night';
            const targetItem = document.querySelector(`.select-items div[data-value="${savedTheme}"]`);
            if (targetItem) {
                document.getElementById('theme-display').innerText = targetItem.innerText;
                document.getElementById('theme-select').value = savedTheme;
            }
            applyTheme(savedTheme);

            loadRecentFiles();
            
            // Floating controls wake
            let hideControlsTimer;
            function wakeControls() {
                const fc = document.querySelector('.floating-controls');
                if(fc) {
                    fc.style.opacity = '1';
                    fc.style.pointerEvents = 'auto';
                    clearTimeout(hideControlsTimer);
                    hideControlsTimer = setTimeout(() => {
                        if (!document.getElementById('theme-selector').classList.contains('active')) {
                            fc.style.opacity = '0';
                            fc.style.pointerEvents = 'none';
                        }
                    }, 2500);
                }
            }
            document.addEventListener('mousemove', wakeControls);
            document.addEventListener('touchstart', wakeControls);
            wakeControls();
        });

    </script>
</body>
</html>
