<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Zone | Braindump Writer</title>
    <style>
        :root {
            --danger: #ff4757;
            --bg-night: #121212; --text-night: #e0e0e0; --accent-night: #333; --bar-night: #ffffff;
            --bg-day: #fbf7f0; --text-day: #5c4b37; --accent-day: #d4c5b0; --bar-day: #8bba94;
            --transition-speed: 0.5s;
        }

        body.theme-night { --bg: var(--bg-night); --text: var(--text-night); --accent: var(--accent-night); --bar: var(--bar-night); --toolbar-bg: rgba(18,18,18,0.95); }
        body.theme-day { --bg: var(--bg-day); --text: var(--text-day); --accent: var(--accent-day); --bar: var(--bar-day); --toolbar-bg: rgba(251,247,240,0.95); }

        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: ui-monospace, SFMono-Regular, "Cascadia Code", Menlo, Consolas, monospace; overflow: hidden; transition: background var(--transition-speed), color var(--transition-speed); }
        
        a { color: var(--bar); text-decoration: none; }
        a:hover { text-decoration: underline; }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 1000; }
        #progress-bar { width: 0%; height: 100%; background: var(--bar); transition: width 1s linear; opacity: 0.7; }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 2000; gap: 15px; transition: opacity 0.4s ease; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        .setup-box { padding: 40px; border-radius: 16px; border: 1px solid var(--accent); background: rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 15px; align-items: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        body.theme-night .setup-box { background: rgba(255,255,255,0.02); }

        h1 { font-weight: 300; letter-spacing: 1px; margin: 0 0 10px 0; font-size: 2.2rem; }
        .row { display: flex; flex-direction: column; gap: 5px; font-size: 0.95rem; width: 100%; align-items: flex-start; }
        
        button, select, input[type="number"] { width: 100%; padding: 10px 16px; background: transparent; border: 1px solid var(--accent); color: var(--text); cursor: pointer; border-radius: 8px; font-family: inherit; font-size: 1rem; transition: all 0.2s; outline: none; box-sizing: border-box; }
        button:hover, select:hover, input[type="number"]:focus { background: var(--accent); color: var(--bg); }
        
        .row-inline { display: flex; justify-content: space-between; width: 100%; align-items: center; }
        input[type="checkbox"] { accent-color: var(--bar); transform: scale(1.2); cursor: pointer; }

        /* Floating Toggles (Theme & Credits) */
        .floating-btn { position: fixed; opacity: 0.15; transition: opacity 0.3s ease; z-index: 3000; cursor: pointer; font-size: 0.9rem; }
        .floating-btn:hover { opacity: 1; }
        
        #theme-wrapper { top: 20px; right: 20px; }
        .theme-switch { width: 56px; height: 30px; background: var(--accent); border-radius: 15px; position: relative; padding: 4px; box-sizing: border-box; transition: background 0.3s; }
        .theme-switch::after { content: "🌙"; position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); }
        body.theme-day .theme-switch::after { content: "☀️"; transform: translateX(26px); }

        #credits-btn { bottom: 20px; left: 20px; padding: 5px 10px; border: 1px solid var(--accent); border-radius: 4px; background: transparent; color: var(--text); width: auto; }

        /* Modal Overlay */
        #credits-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 4000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg); border: 1px solid var(--accent); padding: 30px; border-radius: 12px; max-width: 400px; width: 90%; text-align: left; line-height: 1.6; position: relative; }
        .modal-content p { font-size: 0.9rem; margin: 10px 0; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; color: var(--text); cursor: pointer; width: auto; padding: 0; line-height: 1; }

        /* Writing Area */
        #writing-area { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 40px; box-sizing: border-box; }
        #real-input { position: absolute; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: text; resize: none; top: 0; left: 0; }
        
        #visual-display { width: 100%; max-width: 750px; height: 85vh; font-size: 1.3rem; line-height: 1.8; text-align: left; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; transition: filter 0.3s ease; padding-right: 15px; padding-bottom: 150px; }
        #visual-display::-webkit-scrollbar { width: 6px; }
        #visual-display::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .hardcore { filter: blur(8px); opacity: 0.8; }
        
        #flash-char { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12rem; font-weight: 300; color: var(--text); pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 1; opacity: 0.05; }
        
        #vignette { position: fixed; inset: 0; pointer-events: none; box-shadow: inset 0 0 0px rgba(255,71,87,0); transition: box-shadow 0.4s ease-in-out; z-index: 5; }
        .warning-glow { box-shadow: inset 0 0 80px rgba(255,71,87,0.4) !important; }

        #success-toolbar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: var(--toolbar-bg); border-top: 1px solid var(--accent); display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 2000; transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); transform: translateY(100%); backdrop-filter: blur(10px); }
        #success-toolbar.visible { transform: translateY(0); }
    </style>
</head>
<body class="theme-night">

    <audio id="bg-music"></audio>

    <div id="theme-wrapper" class="floating-btn" onclick="toggleTheme()">
        <div class="theme-switch"></div>
    </div>
    
    <button id="credits-btn" class="floating-btn" onclick="toggleCredits(true)">Music Credits</button>

    <div id="credits-modal" class="hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="toggleCredits(false)">&times;</button>
            <h2 style="margin-top: 0;">Playlist Credits</h2>
            <p>Music by <a href="https://pixabay.com/users/monume-44679891/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=509496" target="_blank">Monume</a> from <a href="https://pixabay.com/music//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=509496" target="_blank">Pixabay</a></p>
            <p>Music by <a href="https://pixabay.com/users/delosound-46524562/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=466475" target="_blank">DELOSound</a> from <a href="https://pixabay.com/music//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=466475" target="_blank">Pixabay</a></p>
            <p>Music by <a href="https://pixabay.com/users/mondamusic-54713575/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=491719" target="_blank">MondaMusic</a> from <a href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=491719" target="_blank">Pixabay</a></p>
            <p>Music by <a href="https://pixabay.com/users/mondamusic-54713575/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=512854" target="_blank">MondaMusic</a> from <a href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=512854" target="_blank">Pixabay</a></p>
        </div>
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="vignette"></div>
    <div id="flash-char"></div>

    <div id="setup-screen" class="screen">
        <div class="setup-box">
            <h1>THE ZONE</h1>
            
            <div class="row">
                <label>Duration:</label>
                <select id="timer-select" onchange="checkCustomTime()">
                    <option value="1">1 Min</option>
                    <option value="2.83">2:50 (Sprint)</option>
                    <option value="5">5 Mins</option>
                    <option value="10" selected>10 Mins</option>
                    <option value="custom">Custom...</option>
                </select>
                <input type="number" id="custom-time" class="hidden" placeholder="Minutes (e.g. 20)" min="1">
            </div>
            
            <div class="row">
                <label>Visual Mode:</label>
                <select id="visual-mode">
                    <option value="normal">Normal</option>
                    <option value="blur" selected>Hardcore (Blur Text)</option>
                </select>
            </div>

            <div class="row">
                <label>Consequence (Idle for 6s):</label>
                <select id="danger-mode">
                    <option value="none">Safe (No pressure)</option>
                    <option value="warning" selected>Warning Only (Red glow)</option>
                    <option value="pause">Strict (Halts session, saves text)</option>
                    <option value="wipeout">Kamikaze (Deletes everything!)</option>
                </select>
            </div>

            <div class="row-inline" style="margin-top: 10px;">
                <label for="music-toggle">Play Lofi Playlist</label>
                <input type="checkbox" id="music-toggle" checked> 
            </div>
            
            <button onclick="initSession()" style="margin-top: 10px; font-weight: bold; border-width: 2px;">START WRITING</button>
        </div>
    </div>

    <div id="fail-screen" class="screen hidden">
        <h1 style="color: var(--danger); font-size: 3rem;">WIPEOUT.</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">The text is gone. Take a breath and try again.</p>
        <button onclick="returnToSetup()" style="width: auto;">Restart</button>
    </div>

    <div id="success-toolbar">
        <span id="toolbar-msg" style="opacity: 0.7; margin-right: 15px; font-size: 0.9rem;">Timer done. Keep writing, or save when ready.</span>
        <button id="save-btn" onclick="saveWork()" style="width: auto;">Save (.md)</button>
        <button onclick="returnToSetup()" style="width: auto;">New Session</button>
    </div>

    <div id="writing-area">
        <textarea id="real-input" spellcheck="false" autocomplete="off" disabled></textarea>
        <div id="visual-display"></div>
    </div>

    <script>
        let duration, timeLeft, clock, dangerTimer;
        let lastInputTime = Date.now();
        let isSessionActive = false; 
        
        // Playlist Configuration
        const playlist = [
            'assets/music/audio1.mp3',
            'assets/music/audio2.mp3',
            'assets/music/audio3.mp3',
            'assets/music/audio4.mp3'
        ];
        let currentTrackIndex = Math.floor(Math.random() * playlist.length); // Start at a random track
        const musicPlayer = document.getElementById('bg-music');

        // Event listener to loop to the next track when current finishes
        musicPlayer.addEventListener('ended', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            musicPlayer.src = playlist[currentTrackIndex];
            musicPlayer.play().catch(e => console.log("Audio play blocked.", e));
        });

        const screens = { setup: document.getElementById('setup-screen'), fail: document.getElementById('fail-screen') };
        const input = document.getElementById('real-input');
        const display = document.getElementById('visual-display');
        const flash = document.getElementById('flash-char');
        const vignette = document.getElementById('vignette');
        const bar = document.getElementById('progress-bar');
        const toolbar = document.getElementById('success-toolbar');
        const toolbarMsg = document.getElementById('toolbar-msg');

        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('theme-night')) {
                body.classList.replace('theme-night', 'theme-day');
            } else {
                body.classList.replace('theme-day', 'theme-night');
            }
        }

        function toggleCredits(show) {
            const modal = document.getElementById('credits-modal');
            if (show) modal.classList.remove('hidden');
            else modal.classList.add('hidden');
        }

        function checkCustomTime() {
            const select = document.getElementById('timer-select');
            const customInput = document.getElementById('custom-time');
            if (select.value === 'custom') {
                customInput.classList.remove('hidden');
                customInput.focus();
            } else {
                customInput.classList.add('hidden');
            }
        }

        function showScreen(screenKey) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            if (screenKey) screens[screenKey].classList.remove('hidden');
        }

        function initSession() {
            const selectVal = document.getElementById('timer-select').value;
            const minutes = selectVal === 'custom' ? document.getElementById('custom-time').value : selectVal;
            if (!minutes || minutes <= 0) return alert("Please enter a valid time.");

            duration = parseFloat(minutes) * 60;
            timeLeft = duration;
            isSessionActive = true;
            
            input.value = "";
            display.innerText = "";
            bar.style.width = "0%";
            toolbar.classList.remove('visible');
            toolbarMsg.innerText = "Timer done. Keep writing, or save when ready.";
            
            if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            
            if (document.getElementById('music-toggle').checked) {
                musicPlayer.src = playlist[currentTrackIndex]; // Set the current track
                musicPlayer.volume = 0.5;
                musicPlayer.play().catch(e => console.log("Audio play blocked.", e));
            }

            if (document.getElementById('visual-mode').value === 'blur') {
                display.classList.add('hardcore');
            } else {
                display.classList.remove('hardcore');
            }

            showScreen(null);
            input.disabled = false;
            input.focus();
            
            lastInputTime = Date.now();
            clock = setInterval(tick, 1000);
            dangerLoop();
        }

        function tick() {
            timeLeft--;
            const percent = ((duration - timeLeft) / duration) * 100;
            bar.style.width = percent + "%";
            
            if (timeLeft <= 0) endTimerPhase();
        }

        function dangerLoop() {
            dangerTimer = setInterval(() => {
                if (!isSessionActive) return;
                
                const dangerMode = document.getElementById('danger-mode').value;
                if (dangerMode === 'none') return; 

                const idleTime = Date.now() - lastInputTime;
                
                if (idleTime > 2000) { 
                    vignette.classList.add('warning-glow');
                } else {
                    vignette.classList.remove('warning-glow');
                }

                if (idleTime > 6000) {
                    if (dangerMode === 'pause') {
                        toolbarMsg.innerText = "Session halted due to inactivity. Save your work.";
                        toolbarMsg.style.color = "var(--danger)";
                        endTimerPhase();
                    } else if (dangerMode === 'wipeout') {
                        killSession(); 
                    }
                }
            }, 100);
        }

        input.addEventListener('input', () => {
            lastInputTime = Date.now();
            display.innerText = input.value;
            display.scrollTop = display.scrollHeight;

            if (isSessionActive && document.getElementById('visual-mode').value === 'blur') {
                const lastChar = input.value.slice(-1);
                if (lastChar && lastChar.trim() !== '') {
                    flash.innerText = lastChar;
                    flash.style.opacity = 0.2;
                    setTimeout(() => flash.style.opacity = 0, 150);
                }
            }
        });

        function endTimerPhase() {
            clearInterval(clock);
            clearInterval(dangerTimer);
            isSessionActive = false; 
            vignette.classList.remove('warning-glow');
            display.classList.remove('hardcore');
            toolbar.classList.add('visible');
            musicPlayer.pause();
        }

        function killSession() {
            clearInterval(clock);
            clearInterval(dangerTimer);
            isSessionActive = false;
            input.disabled = true;
            vignette.classList.remove('warning-glow');
            musicPlayer.pause();
            
            input.value = "";
            display.innerText = "";
            showScreen('fail');
        }

        function saveWork() {
            const content = input.value;
            if (!content) return;

            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Draft_${new Date().toISOString().split('T')[0]}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "✓ Saved";
            setTimeout(() => saveBtn.innerText = "Save (.md)", 2000);
        }

        function returnToSetup() {
            showScreen('setup');
            toolbar.classList.remove('visible');
            toolbarMsg.style.color = "";
            document.getElementById('credits-btn').classList.remove('hidden');
        }
    </script>
</body>
</html>
