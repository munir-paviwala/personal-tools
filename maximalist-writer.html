<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dangerous Writer // Munir's Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-indigo: #1a237e;
            --marigold: #ffc107;
            --burnt-orange: #bf360c;
            --deep-magenta: #880e4f;
            --vibrant-pink: #c2185b;
            --peacock: #00bcd4;
            --forest-green: #1b5e20;
            --white-silk: #f1f1f1;
            --danger-red: #d50000;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--deep-indigo);
            background-image: radial-gradient(var(--marigold) 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--white-silk);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .hub-container {
            background: var(--deep-magenta);
            border: 8px solid var(--marigold);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 15px 15px 0px var(--peacock);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: var(--marigold);
            color: var(--deep-indigo);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 5px 10px;
            border-bottom: 4px solid var(--burnt-orange);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        h1 {
            font-family: 'VT323', monospace;
            font-size: 3.5rem;
            color: var(--marigold);
            margin: 30px 0 10px 0;
            text-shadow: 4px 4px var(--burnt-orange);
            line-height: 1;
            text-align: center;
        }

        /* The Writing Area */
        .writing-zone {
            width: 100%;
            height: 400px;
            background: #000;
            color: var(--marigold);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            padding: 20px;
            border: 6px inset var(--burnt-orange);
            box-shadow: 8px 8px 0px var(--forest-green);
            resize: vertical;
            outline: none;
            line-height: 1.4;
            transition: border-color 0.3s ease;
        }

        .writing-zone:focus {
            border-color: var(--peacock);
        }

        /* Warning State for when the user stops typing */
        .writing-zone.warning {
            border-color: var(--danger-red);
            box-shadow: 8px 8px 0px var(--danger-red);
            animation: shake 0.5s infinite;
        }

        /* Metrics Bar */
        .metrics-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            background: var(--white-silk);
            color: var(--deep-indigo);
            padding: 10px 20px;
            border: 4px solid var(--deep-indigo);
            box-shadow: 6px 6px 0px var(--burnt-orange);
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            align-self: center;
            text-decoration: none;
            background: var(--peacock);
            color: var(--deep-indigo);
            font-weight: bold;
            padding: 15px 30px;
            border: 4px solid var(--deep-indigo);
            box-shadow: 6px 6px 0px var(--marigold);
            transition: all 0.1s ease-in-out;
            text-transform: uppercase;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
        }

        .back-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 10px 10px 0px var(--white-silk);
        }

        .back-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px var(--white-silk);
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .hub-container { padding: 20px; border-width: 4px; box-shadow: 8px 8px 0px var(--peacock); }
            h1 { font-size: 2.2rem; margin-top: 40px; }
            .writing-zone { height: 300px; font-size: 1.2rem; }
            .metrics-bar { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="status-bar">
            <span>SYS: DANGER MODE</span>
            <span>DON'T STOP TYPING</span>
        </div>
        
        <h1>THE MOST DANGEROUS WRITER</h1>
        
        <textarea class="writing-zone" placeholder="Start typing... if you stop for 5 seconds, it all burns..."></textarea>
        
        <div class="metrics-bar">
            <span id="word-count">WORDS: 0</span>
            <span id="timer">TIME: 00:00</span>
        </div>

        <a href="index.html" class="back-btn">&lt;&lt; RETURN TO HUB</a>
    </div>
<script>
    const textarea = document.querySelector('.writing-zone');
    const wordCountDisplay = document.getElementById('word-count');
    const timerDisplay = document.getElementById('timer');
    
    let timerInterval = null;
    let secondsElapsed = 0;
    
    let typingTimer = null;
    const DANGER_DELAY = 5000; // 5 seconds before it burns
    let isTypingStarted = false;

    // Helper to format the timer
    function formatTime(totalSeconds) {
        const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const s = (totalSeconds % 60).toString().padStart(2, '0');
        return `TIME: ${m}:${s}`;
    }

    // Start the session clock
    function startSessionTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            secondsElapsed++;
            timerDisplay.textContent = formatTime(secondsElapsed);
        }, 1000);
    }

    // The brutal wipe function
    function triggerFailure() {
        textarea.value = '';
        textarea.placeholder = "YOU STOPPED. THE FIRE TOOK IT. START AGAIN.";
        textarea.classList.remove('warning');
        wordCountDisplay.textContent = 'WORDS: 0';
        
        clearInterval(timerInterval);
        timerInterval = null;
        secondsElapsed = 0;
        timerDisplay.textContent = formatTime(0);
        isTypingStarted = false;
    }

    // Listen for keystrokes
    textarea.addEventListener('input', () => {
        if (!isTypingStarted) {
            isTypingStarted = true;
            startSessionTimer();
        }

        // Tally words
        const text = textarea.value.trim();
        const words = text === '' ? 0 : text.split(/\s+/).length;
        wordCountDisplay.textContent = `WORDS: ${words}`;

        // Reset the danger states
        textarea.classList.remove('warning');
        clearTimeout(typingTimer);

        // Set the trap
        if (text.length > 0) {
            // Visual panic at 3 seconds
            setTimeout(() => {
                if(isTypingStarted) textarea.classList.add('warning');
            }, DANGER_DELAY - 2000);

            // Complete wipe at 5 seconds
            typingTimer = setTimeout(() => {
                triggerFailure();
            }, DANGER_DELAY);
        }
    });
</script>
</body>
</html>
