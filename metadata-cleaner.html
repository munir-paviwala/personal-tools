<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Eraser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --popati: #ADFF2F;   /* Popati Green */
            --gulabi: #FF1493;   /* Gulabi Pink */
            --morpinch: #004953; /* Peacock Blue */
            --jamli: #4B0082;    /* Purple */
            --sonehri: #FFD700;  /* Gold */
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--gulabi);
            background-image: radial-gradient(var(--jamli) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Gumbaj Header */
        header {
            background: var(--morpinch);
            padding: 40px 20px;
            text-align: center;
            border-radius: 50% 50% 10px 10px / 20% 20% 10px 10px;
            border: 4px solid var(--sonehri);
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            box-shadow: 10px 10px 0px var(--jamli);
        }

        h1 { margin: 0; font-weight: 900; font-size: 2.5rem; color: var(--popati); text-transform: uppercase; }
        p.intro { color: white; max-width: 500px; margin: 15px auto; line-height: 1.4; font-weight: 300; }

        /* Drop Zone */
        #drop-zone {
            width: 100%;
            max-width: 800px;
            height: 150px;
            border: 4px dashed var(--popati);
            background: rgba(0, 73, 83, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        #drop-zone:hover { background: var(--morpinch); border-style: solid; }

        /* Image List Container */
        #image-list {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }

        .image-card {
            background: white;
            color: var(--jamli);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 8px solid var(--popati);
            box-shadow: 5px 5px 0px var(--morpinch);
        }

        .image-preview {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--morpinch);
        }

        .metadata-controls {
            flex: 1;
            min-width: 250px;
        }

        /* Metadata Tree Styling */
        .tree-group { margin-bottom: 10px; border-left: 2px solid var(--popati); padding-left: 10px; }
        .tree-header { font-weight: 900; font-size: 0.9rem; text-transform: uppercase; color: var(--morpinch); cursor: pointer; }
        .tree-items { margin-top: 5px; font-size: 0.8rem; display: flex; flex-direction: column; }
        
        label { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 2px 0; }
        input[type="checkbox"] { accent-color: var(--gulabi); }

        /* Actions */
        .actions {
            position: sticky;
            bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 5px 5px 0px black;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px black; }
        
        .btn-process { background: var(--popati); color: var(--jamli); }
        .btn-reset { background: var(--sonehri); color: var(--jamli); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Metadata Eraser</h1>
        <p class="intro">
            A utilitarian privacy tool wrapped in maximalist joy. 
            Select images, choose exactly which data layers to strip, and export clean versions. 
            Processing happens entirely on your device.
        </p>
    </header>

    <div id="drop-zone">DRAG IMAGES HERE OR CLICK TO BROWSE</div>
    <input type="file" id="file-input" multiple accept="image/jpeg,image/png" class="hidden">

    <div id="image-list"></div>

    <div class="actions">
        <button class="btn-reset" onclick="location.reload()">Clear Studio</button>
        <button class="btn-process" id="download-btn">Download Clean ZIP</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const imageList = document.getElementById('image-list');
        const downloadBtn = document.getElementById('download-btn');
        let filesData = [];

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'white'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = 'var(--popati)'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64 = event.target.result;
                    let metadata = { "0th": {}, "Exif": {}, "GPS": {} };
                    
                    if (file.type === 'image/jpeg') {
                        try {
                            metadata = piexif.load(base64);
                        } catch (e) { console.log("No metadata found in JPEG"); }
                    }

                    const fileId = Math.random().toString(36).substr(2, 9);
                    filesData.push({ id: fileId, file, base64, metadata });
                    renderImageCard(file, base64, metadata, fileId);
                };
                reader.readAsDataURL(file);
            }
        }

        function renderImageCard(file, base64, metadata, id) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.dataset.id = id;

            let metadataHtml = '';
            if (file.type === 'image/jpeg') {
                for (let group in metadata) {
                    const keys = Object.keys(metadata[group]);
                    if (keys.length === 0) continue;
                    
                    metadataHtml += `
                        <div class="tree-group">
                            <div class="tree-header">
                                <input type="checkbox" checked onchange="toggleGroup(this)"> ${group}
                            </div>
                            <div class="tree-items">
                                ${keys.map(tag => `
                                    <label>
                                        <input type="checkbox" checked data-group="${group}" data-tag="${tag}"> 
                                        Tag ${tag}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            } else {
                metadataHtml = `<p style="font-size:0.8rem">PNG detected. All metadata will be stripped upon export (Redraw method).</p>`;
            }

            card.innerHTML = `
                <img src="${base64}" class="image-preview">
                <div class="metadata-controls">
                    <div style="font-weight:900; margin-bottom:10px;">${file.name}</div>
                    ${metadataHtml}
                </div>
            `;
            imageList.appendChild(card);
        }

        function toggleGroup(checkbox) {
            const items = checkbox.closest('.tree-group').querySelectorAll('.tree-items input');
            items.forEach(i => i.checked = checkbox.checked);
        }

        downloadBtn.onclick = async () => {
            const zip = new JSZip();
            const cards = document.querySelectorAll('.image-card');

            for (let card of cards) {
                const id = card.dataset.id;
                const fileObj = filesData.find(f => f.id === id);
                let finalBase64;

                if (fileObj.file.type === 'image/jpeg') {
                    // Filter metadata based on checkboxes
                    const cleanMetadata = { "0th": {}, "Exif": {}, "GPS": {}, "1st": {}, "thumbnail": null };
                    const checkboxes = card.querySelectorAll('input[data-tag]');
                    
                    checkboxes.forEach(cb => {
                        if (cb.checked) {
                            const g = cb.dataset.group;
                            const t = cb.dataset.tag;
                            cleanMetadata[g][t] = fileObj.metadata[g][t];
                        }
                    });

                    const exifStr = piexif.dump(cleanMetadata);
                    finalBase64 = piexif.insert(exifStr, fileObj.base64);
                } else {
                    // PNG nuclear strip: Draw to canvas and back
                    finalBase64 = await stripPngMetadata(fileObj.base64);
                }

                const data = finalBase64.split(',')[1];
                zip.file(`clean_${fileObj.file.name}`, data, {base64: true});
            }

            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "metadata_eraser_export.zip";
                link.click();
            });
        };

        function stripPngMetadata(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = base64;
            });
        }
    </script>
</body>
</html>
