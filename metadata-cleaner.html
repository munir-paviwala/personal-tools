<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Eraser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-indigo: #1a237e;
            --marigold: #ffc107;
            --burnt-orange: #bf360c;
            --deep-magenta: #880e4f;
            --vibrant-pink: #c2185b;
            --peacock: #00bcd4;
            --forest-green: #1b5e20;
            --white-silk: #f1f1f1;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--deep-magenta);
            background-image: 
                linear-gradient(30deg, var(--vibrant-pink) 12%, transparent 12.5%, transparent 87%, var(--vibrant-pink) 87.5%, var(--vibrant-pink)),
                linear-gradient(150deg, var(--vibrant-pink) 12%, transparent 12.5%, transparent 87%, var(--vibrant-pink) 87.5%, var(--vibrant-pink)),
                linear-gradient(30deg, var(--vibrant-pink) 12%, transparent 12.5%, transparent 87%, var(--vibrant-pink) 87.5%, var(--vibrant-pink)),
                linear-gradient(150deg, var(--vibrant-pink) 12%, transparent 12.5%, transparent 87%, var(--vibrant-pink) 87.5%, var(--vibrant-pink)),
                linear-gradient(60deg, #9b125a 25%, transparent 25.5%, transparent 75%, #9b125a 75.5%, #9b125a),
                linear-gradient(60deg, #9b125a 25%, transparent 25.5%, transparent 75%, #9b125a 75.5%, #9b125a);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: var(--deep-indigo);
            padding: 40px 30px;
            text-align: center;
            border-radius: 120px 120px 20px 20px;
            border: 6px solid var(--marigold);
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.4);
        }

        h1 { 
            margin: 0; 
            font-weight: 700; 
            font-size: 2.5rem; 
            color: var(--marigold); 
            letter-spacing: -1px;
            text-shadow: 3px 3px var(--burnt-orange);
        }

        .intro { 
            color: var(--white-silk); 
            max-width: 500px; 
            margin: 15px auto 0; 
            line-height: 1.4; 
            font-size: 1rem;
        }

        #drop-zone {
            width: 100%;
            max-width: 800px;
            height: 100px;
            border: 4px dashed var(--marigold);
            background: var(--peacock);
            color: var(--deep-indigo);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
            box-shadow: 8px 8px 0px var(--deep-indigo);
        }

        #drop-zone:hover { transform: scale(1.01); background: var(--marigold); color: var(--burnt-orange); }

        #image-list {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: var(--white-silk);
            color: #333;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 10px solid var(--marigold);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }

        .image-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 3px solid var(--deep-indigo);
            border-radius: 4px;
        }

        .file-info { flex: 1; overflow: hidden; }
        .file-name { font-weight: 700; font-size: 1.1rem; color: var(--deep-indigo); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-status { font-size: 0.85rem; color: var(--forest-green); margin-top: 4px; font-weight: 500;}

        .actions {
            position: sticky;
            bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 15px;
            margin-top: 30px;
            background: rgba(26, 35, 126, 0.9);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 2px solid var(--marigold);
        }

        button {
            flex: 1;
            padding: 15px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 4px 4px 0px black;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px black; }
        
        .btn-process { background: var(--forest-green); color: white; }
        .btn-reset { background: var(--burnt-orange); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>METADATA ERASER</h1>
        <p class="intro">
            Offline, browser-based metadata cleaner. No data shared. No ads. Just bright colors.
        </p>
    </header>

    <div id="drop-zone">DRAG IMAGES OR CLICK TO OPEN</div>
    <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/webp" class="hidden">

    <div id="image-list"></div>

    <div class="actions">
        <button class="btn-reset" onclick="location.reload()">Reset Studio</button>
        <button class="btn-process" id="download-btn">Download Cleaned Image/s</button>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const imageList = document.getElementById('image-list');
        const downloadBtn = document.getElementById('download-btn');
        let filesData = [];

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = 'var(--marigold)'; };
        dropZone.ondragleave = () => { dropZone.style.background = 'var(--peacock)'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.background = 'var(--peacock)';
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result;
                    const fileId = Math.random().toString(36).substr(2, 9);
                    filesData.push({ id: fileId, file, base64 });
                    renderImageCard(file, base64, fileId);
                };
                reader.readAsDataURL(file);
            }
        }

        function renderImageCard(file, base64, id) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.dataset.id = id;

            card.innerHTML = `
                <img src="${base64}" class="image-preview">
                <div class="file-info">
                    <div class="file-name" title="${file.name}">${file.name}</div>
                    <div class="file-status">✓ Ready to clean</div>
                </div>
            `;
            imageList.appendChild(card);
        }

        downloadBtn.onclick = async () => {
            const cards = document.querySelectorAll('.image-card');
            if (cards.length === 0) return alert("Add images first!");

            downloadBtn.innerText = "Processing...";

            let processedFiles = [];

            for (let card of cards) {
                const id = card.dataset.id;
                const fileObj = filesData.find(f => f.id === id);
                
                // Nuclear redraw for all formats to strip metadata
                const cleanBase64 = await cleanImageViaCanvas(fileObj.base64, fileObj.file.type);
                processedFiles.push({ name: `clean_${fileObj.file.name}`, data: cleanBase64 });
            }

            // Logic: 1 image = Direct download. 2+ images = ZIP.
            if (processedFiles.length === 1) {
                const link = document.createElement('a');
                link.href = processedFiles[0].data;
                link.download = processedFiles[0].name;
                link.click();
            } else {
                const zip = new JSZip();
                processedFiles.forEach(file => {
                    // Remove the data URL prefix (e.g., "data:image/jpeg;base64,") before zipping
                    const base64Data = file.data.split(',')[1];
                    zip.file(file.name, base64Data, {base64: true});
                });
                
                zip.generateAsync({type:"blob"}).then(content => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = "cleaned_images.zip";
                    link.click();
                });
            }

            downloadBtn.innerText = "Download Cleaned Image/s";
        };

        function cleanImageViaCanvas(base64, mimeType) {
            return new Promise(res => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; 
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    // Export back to original format
                    res(canvas.toDataURL(mimeType));
                };
                img.src = base64;
            });
        }
    </script>
</body>
</html>
